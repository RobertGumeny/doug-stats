name: CI

on:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Go binary
        run: go build ./...

      - name: Run tests
        run: go test ./...
