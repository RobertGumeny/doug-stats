# doug-stats backlog.yaml
# Full project backlog: three epics in sequence.
# Each entry matches the doug tasks.yaml schema exactly (epic: at the top level).
# To run an epic, copy its entry into your project's tasks.yaml and run doug.
# Do not begin EPIC-3 until EPIC-2 is complete.

backlog:

  - epic:
      id: "EPIC-1"
      name: "Infrastructure & Build Pipeline"
      tasks:
        - id: "EPIC-1-001"
          type: "feature"
          status: "TODO"
          description: "Scaffold the doug-stats repository and prove the two-stage build pipeline end to end: npm builds the React frontend into frontend/dist/, go build embeds it via embed.FS, and running the binary opens a browser tab showing a placeholder page."
          acceptance_criteria:
            - "Repository is initialized with Go module (github.com/robertgumeny/doug-stats) and a frontend/ directory containing a Vite + React + TypeScript + Tailwind project"
            - "Makefile (or build.sh) runs the frontend build then go build in sequence"
            - "The resulting binary embeds frontend/dist/ via //go:embed and serves it at localhost on an auto-selected port"
            - "Running the binary opens the browser automatically (open on macOS, xdg-open on Linux)"
            - "The browser shows a placeholder React page (e.g. 'doug-stats is running') confirming the embed pipeline works"
            - "go test ./... passes (even if no meaningful tests exist yet)"

        - id: "EPIC-1-002"
          type: "feature"
          status: "TODO"
          description: "Set up GitHub Actions CI (build + test on PR) and a goreleaser release workflow (tag push → darwin/arm64 and linux/amd64 binaries on GitHub Releases), both handling the two-stage build."
          acceptance_criteria:
            - "A GitHub Actions workflow runs on pull_request: executes frontend build, go build, and go test ./..."
            - "A GitHub Actions workflow runs on tag push (v*): builds and publishes cross-platform binaries via goreleaser"
            - "goreleaser config produces binaries for darwin/arm64 and linux/amd64"
            - "goreleaser config correctly handles the two-stage build (npm run build then go build)"
            - ".goreleaser.yaml is present and valid"
            - "Workflows are present at .github/workflows/ci.yml and .github/workflows/release.yml"

        - id: "EPIC-1-003"
          type: "feature"
          status: "TODO"
          description: "Implement the CLI entrypoint: --logs-dir (default ~/, auto-detects ~/.claude, ~/.gemini, ~/.codex), --port (auto-select if busy), --no-ui (accepted, not implemented), and platform-correct browser launch."
          acceptance_criteria:
            - "--logs-dir defaults to ~/ and auto-detects ~/.claude, ~/.gemini, and ~/.codex subdirectories"
            - "--logs-dir can be overridden to point at any root directory (e.g. for test fixtures)"
            - "Provider subdirectories that do not exist are skipped with a warning, not a crash"
            - "--port flag sets the HTTP server port; if the port is busy, the next available port is used"
            - "The selected port and URL are always printed to stdout before the browser opens"
            - "--no-ui flag prints 'not yet implemented' and exits with code 0"
            - "Browser is opened automatically using the correct command for the current platform"
            - "The binary exits cleanly with a helpful message if no provider log directories are found"

  - epic:
      id: "EPIC-2"
      name: "Core Features — Claude Log Parsing & UI"
      tasks:
        - id: "EPIC-2-001"
          type: "feature"
          status: "TODO"
          description: "Implement the Claude Code log scanner and parser as the reference Provider implementation. See PRD.md for the full data source schema, two-phase startup model, and Provider interface requirements."
          acceptance_criteria:
            - "Session discovery uses history.jsonl as the primary index — JSONL files are not walked to discover sessions"
            - "Subagent session files (under <parent-uuid>/subagents/) are not scanned"
            - "Project name is derived from history.jsonl project field"
            - "Task ID is correctly extracted from session files and sessions are classified as Doug, Manual, or Untagged"
            - "Token costs and aggregates are available immediately after startup — transcript data loads on demand when a session is opened"
            - "All four token types (input, cache_creation, cache_read, output) are extracted correctly from assistant records"
            - "Model identifier and timestamp are extracted correctly per assistant record"
            - "Malformed lines and missing fields produce a warning log and are skipped — no crashes"
            - "A common Provider interface is defined that separates session-index/correlation logic from full transcript parsing"
            - "The Claude parser implements the Provider interface"
            - "Unit tests cover task ID extraction, session classification, and token field parsing"

        - id: "EPIC-2-002"
          type: "feature"
          status: "TODO"
          description: "Implement the pricing registry (Go map, model string → ModelPricing struct) and cost aggregation layer. See PRD.md for supported models, token type definitions, and cache pricing assumptions."
          acceptance_criteria:
            - "Pricing registry is a Go map — no scattered hardcoded constants in parsing or aggregation"
            - "All five Claude models are present with correct per-token rates for all four token types"
            - "ModelPricing struct includes fields for Gemini single-cached rate and Codex reasoning rate"
            - "Unrecognized model identifiers return a clear 'Unknown' cost indicator, not zero or a crash"
            - "Aggregation computes totals at message, session, task, and project levels"
            - "Cost is computed in USD rounded to 4 decimal places"
            - "The 5-minute cache tier assumption is documented in a code comment and returned as metadata for UI display"
            - "The HTTP server does not start until all Phase 1 aggregation is complete"
            - "Unit tests cover known model pricing, unknown model fallback, and aggregate correctness"

        - id: "EPIC-2-003"
          type: "feature"
          status: "TODO"
          description: "Implement the in-memory HTTP API layer serving all frontend data. See PRD.md for the full endpoint contract, filter parameters, and response schema requirements."
          acceptance_criteria:
            - "The HTTP server does not accept requests until all provider Phase 1 aggregation is complete"
            - "GET /api/health returns {\"status\":\"ok\"} with HTTP 200"
            - "All five endpoints are implemented and return correct JSON"
            - "Response schemas are documented (inline comment or README)"
            - "provider filter correctly limits results to the specified provider(s)"
            - "doug_only=true excludes Manual and Untagged sessions from results and aggregates"
            - "The virtual task ID 'manual' returns Manual and Untagged sessions correctly"
            - "Project-level aggregates include all session types when no filter is applied"
            - "Error responses use a consistent JSON envelope: {\"error\": \"<message>\"}"
            - "/api/sessions/:id/messages performs a full JSONL parse on demand — no other endpoint reads from disk at runtime"
            - "API handlers have unit tests covering filter behavior and aggregate correctness"

        - id: "EPIC-2-004"
          type: "feature"
          status: "TODO"
          description: "Build the project list and task list views in React, consuming the API defined in EPIC-2-003. Cost visibility is the primary UX goal — token totals and USD costs should be prominent."
          acceptance_criteria:
            - "Frontend polls /api/health and waits for server readiness before rendering data"
            - "Project list renders all projects with correct aggregate totals"
            - "Provider filter (multi-select) correctly filters projects and updates aggregates"
            - "Doug tasks only toggle correctly excludes Manual and Untagged sessions from aggregates"
            - "Task list renders all tasks for the selected project with correct per-task aggregates"
            - "Manual sessions are shown in a separate section below the task list"
            - "Breadcrumb navigation is present and functional"
            - "Cost and token totals are visually prominent in both views"
            - "All data is fetched from the Go API endpoints (not hardcoded)"

        - id: "EPIC-2-005"
          type: "feature"
          status: "TODO"
          description: "Build the session list and transcript views in React, consuming the API defined in EPIC-2-003. Transcripts render turn-by-turn with tool use collapsed by default and per-turn cost shown inline."
          acceptance_criteria:
            - "Session list renders all sessions for the selected task with correct metadata"
            - "Duration is shown if derivable from timestamps, omitted if not"
            - "Transcript view renders all messages in chronological order"
            - "User and assistant turns are visually distinct"
            - "Tool-use blocks are labeled and collapsed by default with a working expand toggle"
            - "Main thread and sidechain messages are visually distinguished"
            - "Per-turn token cost is displayed inline"
            - "Cache tier assumption footnote or tooltip is present on cost displays"
            - "Breadcrumb navigation is present and functional across all four views"
            - "All data is fetched from the Go API endpoints (not hardcoded)"

  - epic:
      id: "EPIC-3"
      name: "Multi-Provider Support — Gemini & Codex"
      tasks:
        - id: "EPIC-3-001"
          type: "feature"
          status: "TODO"
          description: "Implement the Gemini log scanner and parser behind the Provider interface from EPIC-2-001. See PRD.md for the full data source schema, session index layout, and token type definitions."
          acceptance_criteria:
            - "Session discovery uses logs.json as the primary index — chats/ is not walked when logs.json is present"
            - "~/.gemini/history/ is explicitly not scanned"
            - "Project name is derived from the <project-name> directory component"
            - ".project_root is read where present to resolve human-readable project name"
            - "Task ID is correctly extracted from session files and sessions are classified as Doug, Manual, or Untagged"
            - "Token costs and aggregates are available immediately after startup — transcript data loads on demand when a session is opened"
            - "Token counts extracted correctly from tokens.input, tokens.output, tokens.cached, tokens.thoughts, tokens.tool per Gemini turn"
            - "Model identifier extracted from the model field on each Gemini turn"
            - "All five Gemini models present in pricing registry with correct rates"
            - "Gemini sessions appear correctly in all four UI views alongside Claude sessions"
            - "The cached token assumption (read-only rate) is documented in a code comment and surfaced in the UI"
            - "Malformed or missing fields produce a warning and are skipped — no crashes"
            - "Unit tests cover Gemini-specific token extraction and pricing"

        - id: "EPIC-3-002"
          type: "feature"
          status: "TODO"
          description: "Implement the Codex log scanner and parser behind the Provider interface from EPIC-2-001, using state_5.sqlite as the primary session index. See PRD.md for the full schema, SQLite layout, and JSONL line type definitions."
          acceptance_criteria:
            - "Session discovery queries state_5.sqlite threads table — JSONL directory is not walked to discover sessions"
            - "rollout_path from SQLite is used to locate JSONL files directly"
            - "Project name derived from git_origin_url where present, falling back to cwd"
            - "Task ID is correctly extracted from session files and sessions are classified as Doug, Manual, or Untagged"
            - "Token costs and aggregates are available immediately after startup — transcript data loads on demand when a session is opened"
            - "Phase 2 parser extracts payload.payload.cwd from session_meta (double-nested path)"
            - "Phase 2 parser extracts model identifier from payload.model in turn_context lines"
            - "Phase 2 parser extracts per-turn token counts from last_token_usage in token_count event_msg lines"
            - "total_token_usage (cumulative) is never used for per-turn cost calculation"
            - "Token count events are correctly correlated with their preceding agent turns by sequence"
            - "All three Codex models present in pricing registry with correct rates"
            - "Codex sessions appear correctly in all four UI views alongside Claude and Gemini sessions"
            - "Malformed lines produce a warning and are skipped — no crashes"
            - "Unit tests cover Codex-specific SQLite query, turn correlation, and pricing"

        - id: "EPIC-3-003"
          type: "feature"
          status: "TODO"
          description: "Validate end-to-end correctness across all three providers and write the README covering supported providers, the --logs-dir flag, and known limitations."
          acceptance_criteria:
            - "Project-level aggregates correctly include sessions from all three providers"
            - "Provider filter in the UI correctly isolates and combines all provider combinations"
            - "Per-session cost is correct for a representative session from each provider"
            - "Transcript view works correctly for sessions from all three providers"
            - "README documents supported providers, log directory defaults, and the --logs-dir flag"
            - "README documents the three known gaps as expected limitations"